<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Checkout - Erick's Bakery</title>

<style>

body{
  font-family: Arial;
  background: #f5deb3;
  text-align: center;
  padding: 30px;
}

.box{
  background: white;
  width: 380px;
  margin: auto;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

h1{
  color: #a0522d;
}

input, select{
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button{
  width: 95%;
  padding: 10px;
  background: green;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover{
  background: darkgreen;
}

.total{
  font-weight: bold;
  margin: 10px 0;
  color: #a0522d;
}

/* ocultar tarjeta */
#cardFields{
  display: none;
}

</style>

</head>

<body>

<div class="box">

<h1>💳 Checkout</h1>

<p class="total">Total: <span id="total"></span></p>

<!-- DATOS CLIENTE -->
<input type="text" id="nombre" placeholder="Nombre completo">
<input type="text" id="direccion" placeholder="Dirección">
<input type="tel" id="telefono" placeholder="Teléfono">

<!-- MÉTODO -->
<select id="metodo" onchange="mostrarCampos()">
  <option value="">Método de pago</option>
  <option value="efectivo">💵 Efectivo</option>
  <option value="paypal">PayPal</option>
  <option value="mercadopago">Mercado Pago</option>
  <option value="visa">Visa</option>
  <option value="mastercard">MasterCard</option>
</select>

<hr>

<h3>💳 Datos de tarjeta</h3>

<div id="cardFields">

<input type="text" id="numero" placeholder="Número de tarjeta (16 dígitos)">
<input type="text" id="cvv" placeholder="CVV (3 dígitos)">

</div>

<button onclick="pagar()">💳 Confirmar pago</button>

</div>

<script>

// total
let total = localStorage.getItem("totalPago") || 0;
document.getElementById("total").textContent = "$" + total;

/* mostrar u ocultar tarjeta */
function mostrarCampos(){

  let metodo = document.getElementById("metodo").value;
  let card = document.getElementById("cardFields");

  if(metodo === "efectivo"){
    card.style.display = "none";
  } else {
    card.style.display = "block";
  }

}

/* validación Luhn */
function validarTarjeta(numero) {

  numero = numero.replace(/\s/g, '');

  if(!/^\d+$/.test(numero)) return false;
  if(numero.length !== 16) return false;

  let suma = 0;
  let doble = false;

  for(let i = numero.length - 1; i >= 0; i--) {

    let digito = parseInt(numero[i]);

    if(doble){
      digito *= 2;
      if(digito > 9) digito -= 9;
    }

    suma += digito;
    doble = !doble;
  }

  return (suma % 10) === 0;
}

/* pagar */
function pagar(){

  let nombre = document.getElementById("nombre").value;
  let direccion = document.getElementById("direccion").value;
  let telefono = document.getElementById("telefono").value;
  let metodo = document.getElementById("metodo").value;

  if(!nombre || !direccion || !telefono || !metodo){
    alert("⚠️ Completa todos los datos");
    return;
  }

  // 💵 EFECTIVO
  if(metodo === "efectivo"){

    alert(
      "💵 Pedido en efectivo confirmado\n\n" +
      "Total: $" + total + "\n" +
      "Paga al recibir tu pedido"
    );

    localStorage.removeItem("totalPago");
    window.location.href = "index.html";
    return;
  }

  // 💳 TARJETA
  let numero = document.getElementById("numero").value;
  let cvv = document.getElementById("cvv").value;

  if(!validarTarjeta(numero)){
    alert("❌ Número de tarjeta inválido");
    return;
  }

  if(!/^\d{3}$/.test(cvv)){
    alert("❌ CVV inválido");
    return;
  }

  alert(
    "✅ Pago aprobado\n\n" +
    "Método: " + metodo + "\n" +
    "Total: $" + total
  );

  localStorage.removeItem("totalPago");
  window.location.href = "menu.html";
}

</script>

</body>
</html>
